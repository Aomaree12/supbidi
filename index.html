<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบตรวจการพยาบาล - สถาบันบำราศนราดูร</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    // --- 1. ตั้งค่าพื้นฐาน ---
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyJOupuuLL4ntEMR5uqV_8-1TIk0JbRo3rh2cHYEpuR98L-Ne2uV1Aek6aTWlOazOPFug/exec';
    
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ocean: { 50:'#eef6fb', 100:'#d4eaf5', 200:'#a8d5eb', 300:'#6db8dc', 400:'#3a9ac9', 500:'#1a7ab5', 600:'#14608f', 700:'#104a6e', 800:'#0d3a57', 900:'#0a2d44' },
            coral: { 400:'#f87171', 500:'#ef4444' },
            mint: { 400:'#34d399', 500:'#10b981' }
          }
        }
      }
    }
  </script>

  <style>
    /* --- 2. CSS Styles --- */
    * { font-family: 'Noto Sans Thai', 'Sarabun', sans-serif; }
    body { box-sizing: border-box; }
    #app { 
      background: linear-gradient(160deg, #eef6fb 0%, #d4eaf5 40%, #a8d5eb 100%) !important; 
      min-height: 100vh;
    }
    .glass-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.5); }
    .month-card { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); }
    .month-card:hover { transform: translateY(-6px) scale(1.03); box-shadow: 0 20px 40px rgba(26,122,181,0.15); }
    @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .slide-up { animation: fadeIn 0.5s ease-out forwards; }
    .overlay-bg { background: rgba(10,45,68,0.6); backdrop-filter: blur(6px); }
    .year-tab { transition: all 0.25s ease; cursor: pointer; }
    .year-tab.active { background: linear-gradient(135deg, #1a7ab5, #14608f); color: white; box-shadow: 0 4px 16px rgba(26,122,181,0.3); }
    .btn-primary { background: linear-gradient(135deg, #1a7ab5, #14608f); transition: all 0.25s ease; }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(26,122,181,0.35); transform: translateY(-1px); }
    .badge-year { background: linear-gradient(135deg, #1a7ab5 0%, #3a9ac9 100%); }
  </style>
</head>

<body class="h-full">
  <div id="app" class="h-full w-full overflow-auto">
    
    <header class="sticky top-0 z-30 glass-card border-b border-ocean-200/50">
      <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-xl badge-year flex items-center justify-center shadow-lg">
            <i data-lucide="shield-check" class="text-white w-7 h-7"></i>
          </div>
          <div>
            <h1 class="text-lg font-bold text-ocean-800 leading-tight">ระบบตรวจการพยาบาล</h1>
            <p class="text-sm text-ocean-500 font-medium">สถาบันบำราศนราดูร</p>
          </div>
        </div>
        <button id="btn-add" class="btn-primary text-white px-5 py-2.5 rounded-xl font-semibold text-sm flex items-center gap-2 shadow-md">
          <i data-lucide="plus-circle" class="w-4 h-4"></i> เพิ่มรายการ
        </button>
      </div>
    </header>

    <div class="max-w-6xl mx-auto px-4 pt-5 pb-2">
      <div id="year-tabs" class="flex gap-2 flex-wrap"></div>
    </div>

    <main class="max-w-6xl mx-auto px-4 pb-8">
      <div id="month-grid" class="grid grid-cols-1 xs:grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 mt-4"></div>
      
      <div id="empty-state" class="hidden text-center py-20 fade-in">
        <div class="w-20 h-20 mx-auto rounded-2xl bg-ocean-100 flex items-center justify-center mb-4">
          <i data-lucide="calendar-x" class="text-ocean-300 w-10 h-10"></i>
        </div>
        <p class="text-ocean-400 text-lg font-medium">ยังไม่มีรายการ</p>
        <p class="text-ocean-300 text-sm mt-1">กดปุ่ม "เพิ่มรายการ" เพื่อเริ่มต้น</p>
      </div>
    </main>

    <div id="modal-add" class="fixed inset-0 z-50 hidden overlay-bg flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md slide-up overflow-hidden">
        <div class="px-6 py-5 border-b border-ocean-100 flex items-center justify-between">
          <h2 class="text-lg font-bold text-ocean-800 flex items-center gap-2"><i data-lucide="calendar-plus" class="text-ocean-500"></i> เพิ่มรายการตรวจ</h2>
          <button id="close-add" class="w-8 h-8 rounded-lg hover:bg-ocean-50 flex items-center justify-center text-ocean-400"><i data-lucide="x"></i></button>
        </div>
        <form id="form-add" class="px-6 py-5 space-y-4">
          <div>
            <label class="block text-sm font-semibold text-ocean-700 mb-1.5">ปี (พ.ศ.)</label>
            <select id="input-year" class="w-full border border-ocean-200 rounded-xl px-4 py-3 outline-none"></select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-ocean-700 mb-1.5">ชื่อเดือน</label>
            <input id="input-month" type="text" placeholder="มกราคม" class="w-full border border-ocean-200 rounded-xl px-4 py-3 outline-none" required>
          </div>
          <div>
            <label class="block text-sm font-semibold text-ocean-700 mb-1.5">ลิงค์</label>
            <input id="input-link" type="url" placeholder="https://..." class="w-full border border-ocean-200 rounded-xl px-4 py-3 outline-none">
          </div>
          <div id="add-error" class="hidden text-red-500 text-sm font-medium"></div>
          <button type="submit" id="btn-submit-add" class="w-full btn-primary text-white py-3 rounded-xl font-bold">บันทึกรายการ</button>
        </form>
      </div>
    </div>

    <div id="modal-edit" class="fixed inset-0 z-50 hidden overlay-bg flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md slide-up overflow-hidden">
        <div class="px-6 py-5 border-b border-ocean-100 flex items-center justify-between">
          <h2 class="text-lg font-bold text-ocean-800 flex items-center gap-2"><i data-lucide="edit-3" class="text-ocean-500"></i> แก้ไขรายการ</h2>
          <button id="close-edit" class="w-8 h-8 rounded-lg hover:bg-ocean-50 flex items-center justify-center text-ocean-400"><i data-lucide="x"></i></button>
        </div>
        <form id="form-edit" class="px-6 py-5 space-y-4">
          <select id="edit-year" class="w-full border border-ocean-200 rounded-xl px-4 py-3 outline-none"></select>
          <input id="edit-month" type="text" class="w-full border border-ocean-200 rounded-xl px-4 py-3 outline-none" required>
          <input id="edit-link" type="url" class="w-full border border-ocean-200 rounded-xl px-4 py-3 outline-none">
          <div id="edit-error" class="hidden text-red-500 text-sm font-medium"></div>
          <button type="submit" id="btn-submit-edit" class="w-full btn-primary text-white py-3 rounded-xl font-bold">บันทึกการแก้ไข</button>
        </form>
      </div>
    </div>

    <div id="modal-delete" class="fixed inset-0 z-50 hidden overlay-bg flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm slide-up p-6">
        <h2 class="text-lg font-bold text-coral-500 mb-2">ยืนยันการลบ</h2>
        <p id="delete-info" class="text-sm text-ocean-500 mb-4"></p>
        <input id="input-password" type="password" placeholder="รหัสผ่าน" class="w-full border p-3 rounded-xl mb-4 text-center outline-none focus:ring-2 focus:ring-coral-400">
        <div id="delete-error" class="hidden text-red-500 text-sm mb-4 font-medium"></div>
        <div class="flex gap-3">
          <button id="btn-cancel-delete" class="flex-1 py-3 border rounded-xl font-semibold">ยกเลิก</button>
          <button id="btn-confirm-delete" class="flex-1 py-3 bg-coral-500 text-white rounded-xl font-bold shadow-md">ลบรายการ</button>
        </div>
      </div>
    </div>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 hidden px-6 py-3 rounded-full text-white font-semibold shadow-xl"></div>
  </div>

  <script>
    // --- 3. JavaScript Logic ---
    const MONTH_ICONS = {
      'มกราคม':'snowflake','กุมภาพันธ์':'heart','มีนาคม':'flower-2','เมษายน':'droplets',
      'พฤษภาคม':'sun','มิถุนายน':'cloud-rain','กรกฎาคม':'cloud-sun','สิงหาคม':'crown',
      'กันยายน':'leaf','ตุลาคม':'umbrella','พฤศจิกายน':'wind','ธันวาคม':'gift'
    };

    let allData = [];
    let selectedYear = null;
    let editTarget = null;
    let deleteTarget = null;

    window.onload = async () => {
      initYearSelects();
      lucide.createIcons();
      await syncDataWithGAS();
    };

    function initYearSelects() {
      const yearAdd = document.getElementById('input-year');
      const yearEdit = document.getElementById('edit-year');
      const currentBE = new Date().getFullYear() + 543;
      for (let y = currentBE - 2; y <= currentBE + 3; y++) {
        let opt = new Option(y, y);
        if (y === currentBE) opt.selected = true;
        yearAdd.add(opt);
        yearEdit.add(opt.cloneNode(true));
      }
    }

    async function syncDataWithGAS() {
      showToast('กำลังโหลดข้อมูล...', 'info');
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'read' }) });
        const result = await res.json();
        if (result.success) {
          allData = result.data.map((row, idx) => ({
            year: String(row[0]),
            month_name: row[1],
            link: row[2],
            id: idx
          }));
          renderYearTabs();
          renderGrid();
          showToast('โหลดข้อมูลสำเร็จ', 'success');
        }
      } catch (e) {
        showToast('เชื่อมต่อฐานข้อมูลล้มเหลว', 'error');
      }
    }

    function renderYearTabs() {
      const container = document.getElementById('year-tabs');
      const years = [...new Set(allData.map(d => d.year))].sort((a,b) => b-a);
      
      let html = `<button onclick="filterYear(null)" class="year-tab px-4 py-2 rounded-xl text-sm font-semibold ${selectedYear === null ? 'active' : 'bg-white/70 text-ocean-600'}">ทั้งหมด</button>`;
      
      years.forEach(y => {
        html += `<button onclick="filterYear('${y}')" class="year-tab px-4 py-2 rounded-xl text-sm font-semibold ${selectedYear === y ? 'active' : 'bg-white/70 text-ocean-600'}">${y}</button>`;
      });
      container.innerHTML = html;
    }

    function filterYear(y) {
      selectedYear = y;
      renderYearTabs();
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('month-grid');
      const filtered = selectedYear ? allData.filter(d => d.year === selectedYear) : allData;
      
      if (filtered.length === 0) {
        grid.innerHTML = '';
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }
      document.getElementById('empty-state').classList.add('hidden');
      
      grid.innerHTML = filtered.map(item => `
        <div class="month-card glass-card rounded-2xl p-5 fade-in relative group cursor-pointer" onclick="if('${item.link}') window.open('${item.link}','_blank')">
          <div class="w-14 h-14 rounded-xl badge-year flex items-center justify-center mb-3 shadow-md">
            <i data-lucide="${MONTH_ICONS[item.month_name] || 'calendar'}" class="text-white w-7 h-7"></i>
          </div>
          <p class="text-base font-bold text-ocean-800">${item.month_name}</p>
          <p class="text-xs text-ocean-400 font-medium">พ.ศ. ${item.year}</p>
          <div class="mt-3 flex items-center gap-1.5 text-mint-500">
            <i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i>
            <span class="text-xs font-semibold">บันทึกแล้ว</span>
          </div>
          
          <div class="absolute top-3 right-3 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="event.stopPropagation(); openEditModal('${item.month_name}', '${item.year}', '${item.link}')" class="p-1.5 bg-white shadow-sm rounded-lg text-ocean-600 hover:bg-ocean-50">
              <i data-lucide="edit-3" class="w-4 h-4"></i>
            </button>
            <button onclick="event.stopPropagation(); openDeleteModal('${item.month_name}', '${item.year}')" class="p-1.5 bg-white shadow-sm rounded-lg text-coral-500 hover:bg-coral-50">
              <i data-lucide="trash-2" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    // Modal Actions
    document.getElementById('btn-add').onclick = () => document.getElementById('modal-add').classList.remove('hidden');
    document.getElementById('close-add').onclick = () => document.getElementById('modal-add').classList.add('hidden');

    document.getElementById('form-add').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-submit-add');
      const err = document.getElementById('add-error');
      
      const payload = {
        action: 'add',
        year: document.getElementById('input-year').value,
        month: document.getElementById('input-month').value.trim(),
        link: document.getElementById('input-link').value.trim()
      };

      if (allData.some(d => d.year === payload.year && d.month_name === payload.month)) {
        err.innerText = '❌ มีข้อมูลปีและเดือนนี้อยู่แล้ว';
        err.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = 'กำลังบันทึก...';
      
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.success) {
          document.getElementById('modal-add').classList.add('hidden');
          Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success');
          await syncDataWithGAS();
        }
      } catch (e) { Swal.fire('Error', 'เกิดข้อผิดพลาดในการบันทึก', 'error'); }
      btn.disabled = false;
      btn.innerHTML = 'บันทึกรายการ';
    };

    function openEditModal(m, y, l) {
      editTarget = { oldMonth: m, oldYear: y };
      document.getElementById('edit-month').value = m;
      document.getElementById('edit-year').value = y;
      document.getElementById('edit-link').value = l;
      document.getElementById('modal-edit').classList.remove('hidden');
    }

    document.getElementById('close-edit').onclick = () => document.getElementById('modal-edit').classList.add('hidden');
    
    document.getElementById('form-edit').onsubmit = async (e) => {
      e.preventDefault();
      const payload = {
        action: 'update',
        oldMonth: editTarget.oldMonth,
        oldYear: editTarget.oldYear,
        month: document.getElementById('edit-month').value,
        year: document.getElementById('edit-year').value,
        link: document.getElementById('edit-link').value
      };

      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.success) {
          document.getElementById('modal-edit').classList.add('hidden');
          syncDataWithGAS();
        }
      } catch (e) { Swal.fire('Error', 'แก้ไขข้อมูลไม่สำเร็จ', 'error'); }
    };

    function openDeleteModal(m, y) {
      deleteTarget = { m, y };
      document.getElementById('delete-info').innerText = `ต้องการลบรายการ: ${m} พ.ศ. ${y}?`;
      document.getElementById('modal-delete').classList.remove('hidden');
    }

    document.getElementById('btn-cancel-delete').onclick = () => document.getElementById('modal-delete').classList.add('hidden');

    document.getElementById('btn-confirm-delete').onclick = async () => {
      if (document.getElementById('input-password').value !== '1234') {
        document.getElementById('delete-error').innerText = 'รหัสผ่านไม่ถูกต้อง';
        document.getElementById('delete-error').classList.remove('hidden');
        return;
      }
      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'delete', month: deleteTarget.m, year: deleteTarget.y })
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById('modal-delete').classList.add('hidden');
          syncDataWithGAS();
        }
      } catch (e) { Swal.fire('Error', 'ลบไม่สำเร็จ', 'error'); }
    };

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.className = `fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full text-white font-semibold shadow-xl transition-all ${type === 'success' ? 'bg-mint-500' : type === 'error' ? 'bg-red-500' : 'bg-ocean-600'}`;
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }
  </script>
</body>
</html>
