// Element SDK

    document.body.style.fontFamily = `${ff}, Sarabun, sans-serif`;
    document.getElementById('app').style.background = `linear-gradient(160deg, ${bg} 0%, ${sc}33 100%)`;

    document.getElementById('el-institute').style.fontSize = `${fs * 0.875}px`;

  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({background_color:v}); }},
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({surface_color:v}); }},
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({text_color:v}); }},
      { get: () => config.primary_color || defaultConfig.primary_color, set: v => { config.primary_color = v; window.elementSdk.setConfig({primary_color:v}); }},
      { get: () => config.secondary_color || defaultConfig.secondary_color, set: v => { config.secondary_color = v; window.elementSdk.setConfig({secondary_color:v}); }}
    ],
    borderables: [],
    fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({font_family:v}); }},
    fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: v => { config.font_size = v; window.elementSdk.setConfig({font_size:v}); }}
  }),
  mapToEditPanelValues: (config) => new Map([
    ['main_title', config.main_title || defaultConfig.main_title],
    ['institute_name', config.institute_name || defaultConfig.institute_name]
  ])
});

// Populate year select
const yearSelect = document.getElementById('input-year');
const editYearSelect = document.getElementById('edit-year');
const currentBE = new Date().getFullYear() + 543;
for (let y = currentBE - 2; y <= currentBE + 3; y++) {
  const opt = document.createElement('option');
  opt.value = y; opt.textContent = y;
  if (y === currentBE) opt.selected = true;
  yearSelect.appendChild(opt);
  
  const opt2 = opt.cloneNode(true);
  editYearSelect.appendChild(opt2);
}

// Sync with Google Apps Script
async function syncDataWithGAS() {
  try {
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'read' })
    });
    const result = await response.json();
    if (result.success && result.data && Array.isArray(result.data)) {
      allData = result.data.map((row, idx) => ({
        __backendId: `gas-${idx}`,
        type: 'inspection',
        year: row[0] ? String(row[0]) : '',
        month_name: row[1] || '',
        link: row[2] || '',
        created_at: new Date().toISOString()
      }));
      renderYearTabs();
      renderGrid();
      showToast('ดึงข้อมูลสำเร็จ', 'success');
    }
  } catch (err) {
    console.error('Sync failed:', err);
    showToast('ไม่สามารถซิงค์ข้อมูลได้', 'error');
  }
}

// Add to Google Apps Script
async function addToGAS(year, monthName, link) {
  try {
    const payload = {
      action: 'add',
      year: String(year),
      month: monthName,
      link: link
    };
    
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    
    const responseText = await response.text();
    const result = JSON.parse(responseText);
    
    if (result.success) {
      // Wait 1.5 seconds for GAS to update sheet, then sync
      await new Promise(r => setTimeout(r, 1500));
      await syncDataWithGAS();
      return true;
    }
    return false;
  } catch (err) {
    console.error('Add failed:', err);
    return false;
  }
}

  try {
    const payload = {

      await new Promise(r => setTimeout(r, 1500));

    }

    console.error('Delete failed:', err);

  }
}

// Update in Google Apps Script
async function updateToGAS(oldMonth, oldYear, newYear, newMonth, newLink) {
  try {
    const payload = {
      action: 'update',
      oldMonth: oldMonth,
      oldYear: String(oldYear),
      year: String(newYear),
      month: newMonth,
      link: newLink
    };
    
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    
    const responseText = await response.text();
    const result = JSON.parse(responseText);
    
    if (result.success) {
      // Wait 1.5 seconds for GAS to update sheet, then sync
      await new Promise(r => setTimeout(r, 1500));
      await syncDataWithGAS();
      return true;
    }
    return false;
  } catch (err) {
    console.error('Update failed:', err);
    return false;
  }
}

// Initialize app - prioritize Google Apps Script
(async () => {
  console.log('🔄 Initializing app...');
  
  // Test GAS connection first
  const gasConnected = await testGASConnection();
  
  if (gasConnected) {
    console.log('✓ Google Apps Script connected successfully');
    showToast('เชื่อมต่อ Google Apps Script สำเร็จ', 'success');

    showToast('⚠️ ไม่สามารถเชื่อมต่อ Google Apps Script - ตรวจสอบ URL', 'error');
    Swal.fire({

      title: 'ไม่สามารถเชื่อมต่อ',
      text: 'ไม่พบการเชื่อมต่อ Google Apps Script\n\nโปรดตรวจสอบ:\n1. URL ของ Google Apps Script\n2. Google Apps Script ได้เผยแพร่แล้ว\n3. ฟังก์ชัน doPost() มีอยู่ในโค้ด',
      confirmButtonText: 'ตกลง',
      confirmButtonColor: '#1a7ab5',
      allowOutsideClick: false
    });
  }
})();

function getYears() {
  const s = new Set(allData.map(d => d.year));
  return [...s].sort((a,b) => Number(b) - Number(a));
}

function renderYearTabs() {
  const container = document.getElementById('year-tabs');
  const years = getYears();
  if (!years.length) { container.innerHTML = ''; return; }
  if (!selectedYear || !years.includes(selectedYear)) selectedYear = years[0];

  const existing = new Map([...container.children].map(el => [el.dataset.year, el]));
  const toKeep = new Set();

  // "all" tab
  toKeep.add('all');
  if (!existing.has('all')) {
    const btn = document.createElement('button');
    btn.dataset.year = 'all';
    btn.className = `year-tab px-4 py-2 rounded-xl text-sm font-semibold ${!selectedYear ? 'active' : 'bg-white/70 text-ocean-600 hover:bg-white'}`;
    btn.textContent = 'ทั้งหมด';
    btn.onclick = () => { selectedYear = null; renderYearTabs(); renderGrid(); };
    container.prepend(btn);
  } else {
    const btn = existing.get('all');
    btn.className = `year-tab px-4 py-2 rounded-xl text-sm font-semibold ${!selectedYear ? 'active' : 'bg-white/70 text-ocean-600 hover:bg-white'}`;
  }

  years.forEach(y => {
    toKeep.add(y);
    if (!existing.has(y)) {
      const btn = document.createElement('button');
      btn.dataset.year = y;
      btn.className = `year-tab px-4 py-2 rounded-xl text-sm font-semibold ${selectedYear === y ? 'active' : 'bg-white/70 text-ocean-600 hover:bg-white'}`;
      btn.innerHTML = `<span class="flex items-center gap-1.5"><i data-lucide="calendar" style="width:14px;height:14px;"></i>${y}</span>`;
      btn.onclick = () => { selectedYear = y; renderYearTabs(); renderGrid(); };
      container.appendChild(btn);
    } else {
      const btn = existing.get(y);
      btn.className = `year-tab px-4 py-2 rounded-xl text-sm font-semibold ${selectedYear === y ? 'active' : 'bg-white/70 text-ocean-600 hover:bg-white'}`;
    }
  });

  existing.forEach((el, key) => { if (!toKeep.has(key)) el.remove(); });
  lucide.createIcons();
}

function renderGrid() {
  const grid = document.getElementById('month-grid');
  const empty = document.getElementById('empty-state');
  let filtered = selectedYear ? allData.filter(d => d.year === selectedYear) : [...allData];
  filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

  if (!filtered.length) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  const existingCards = new Map([...grid.children].map(el => [el.dataset.id, el]));
  const toKeep = new Set();

  filtered.forEach((item, idx) => {
    const id = item.__backendId;
    toKeep.add(id);
    const iconName = MONTH_ICONS[item.month_name] || 'calendar';

    if (existingCards.has(id)) {
      const card = existingCards.get(id);
      card.querySelector('.card-month').textContent = item.month_name;
      card.querySelector('.card-year').textContent = `พ.ศ. ${item.year}`;
    } else {
      const card = document.createElement('div');
      card.dataset.id = id;
      card.className = 'month-card glass-card rounded-2xl p-5 cursor-default fade-in relative group';
      card.style.animationDelay = `${idx * 0.05}s`;
      card.style.opacity = '0';
      
      const cardContent = document.createElement('div');
      cardContent.className = item.link ? 'cursor-pointer' : '';
      cardContent.innerHTML = `
        <div class="w-14 h-14 rounded-xl badge-year flex items-center justify-center mb-3 shadow-md">
          <i data-lucide="${iconName}" class="text-white" style="width:28px;height:28px;"></i>
        </div>
        <p class="card-month text-base font-bold text-ocean-800">${item.month_name}</p>
        <p class="card-year text-xs text-ocean-400 font-medium mt-0.5">พ.ศ. ${item.year}</p>
        <div class="mt-3 flex items-center gap-1.5 text-mint-500">
          <i data-lucide="check-circle-2" style="width:14px;height:14px;"></i>
          <span class="text-xs font-semibold">บันทึกแล้ว</span>
        </div>
      `;
      
      if (item.link) {
        cardContent.style.cursor = 'pointer';
        cardContent.onclick = () => window.open(item.link, '_blank');
      }
      
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'delete-btn absolute top-3 right-3 w-8 h-8 rounded-lg bg-coral-500/0 group-hover:bg-coral-500/10 flex items-center justify-center text-ocean-300 group-hover:text-coral-500 transition-all';
      deleteBtn.title = 'ลบ';
      deleteBtn.innerHTML = '<i data-lucide="trash-2" style="width:16px;height:16px;"></i>';
      deleteBtn.onclick = (e) => {
        e.stopPropagation();
        openDeleteModal(item);
      };
      
      const editBtn = document.createElement('button');
      editBtn.className = 'edit-btn absolute top-3 right-12 w-8 h-8 rounded-lg bg-ocean-500/0 group-hover:bg-ocean-500/10 flex items-center justify-center text-ocean-300 group-hover:text-ocean-600 transition-all';
      editBtn.title = 'แก้ไข';
      editBtn.innerHTML = '<i data-lucide="edit-3" style="width:16px;height:16px;"></i>';
      editBtn.onclick = (e) => {
        e.stopPropagation();
        openEditModal(item);
      };
      
      card.appendChild(cardContent);
      card.appendChild(editBtn);
      card.appendChild(deleteBtn);
      grid.appendChild(card);
    }
  });

  existingCards.forEach((el, key) => { if (!toKeep.has(key)) el.remove(); });
  lucide.createIcons();
}

// Add modal
document.getElementById('btn-add').onclick = () => {
  document.getElementById('modal-add').classList.remove('hidden');
  document.getElementById('input-month').value = '';
  document.getElementById('input-link').value = '';
  document.getElementById('add-error').classList.add('hidden');
};
document.getElementById('close-add').onclick = () => document.getElementById('modal-add').classList.add('hidden');
document.getElementById('modal-add').onclick = (e) => { if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden'); };

document.getElementById('form-add').onsubmit = async (e) => {
  e.preventDefault();
  const year = document.getElementById('input-year').value;
  const month = document.getElementById('input-month').value.trim();
  const link = document.getElementById('input-link').value.trim();
  const errEl = document.getElementById('add-error');

  if (!month) { errEl.textContent = 'กรุณาใส่ชื่อเดือน'; errEl.classList.remove('hidden'); return; }
  if (allData.length >= 999) { errEl.textContent = 'ถึงจำนวนสูงสุดแล้ว (999 รายการ)'; errEl.classList.remove('hidden'); return; }
  
  // Check for duplicates from allData (client-side validation first)
  const isDuplicate = allData.some(d => d.year === year && d.month_name === month);
  if (isDuplicate) { 
    errEl.textContent = `❌ มีเดือนนี้แล้ว (พ.ศ. ${year} ${month})`; 
    errEl.classList.remove('hidden'); 
    return; 
  }
  
  // Additional server-side check via Google Apps Script
  try {
    const checkResponse = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'checkDuplicate', year: String(year), month: month })
    });
    
    const checkText = await checkResponse.text();
    const checkResult = JSON.parse(checkText);
    
    if (checkResult.exists) {
      errEl.textContent = `❌ มีเดือนนี้แล้ว (พ.ศ. ${year} ${month})`;
      errEl.classList.remove('hidden');
      return;
    }
  } catch (err) {
    console.warn('Could not verify on server, proceeding with client check:', err);
  }

  const btn = document.getElementById('btn-submit-add');
  btn.disabled = true; 
  btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin" style="width:18px;height:18px;"></i> กำลังบันทึก...';
  lucide.createIcons();

  let success = false;
  try {
    success = await addToGAS(year, month, link);
  } catch (err) {
    console.error('Add operation failed:', err);
  }

  btn.disabled = false; 
  btn.innerHTML = '<i data-lucide="check-circle" style="width:18px;height:18px;"></i> บันทึกรายการ';
  lucide.createIcons();

  if (success) {
    document.getElementById('modal-add').classList.add('hidden');
    selectedYear = year;
    Swal.fire({
      icon: 'success',
      title: 'สำเร็จ!',
      text: 'บันทึกข้อมูลสำเร็จแล้ว',
      confirmButtonText: 'ตกลง',
      confirmButtonColor: '#1a7ab5'
    });
  } else {
    errEl.textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่'; 
    errEl.classList.remove('hidden');
  }
};

function showToast(msg, type) {
  const t = document.getElementById('toast');
  const inner = t.querySelector('div');
  inner.className = `px-5 py-3 rounded-xl shadow-xl text-white font-semibold text-sm flex items-center gap-2 ${type === 'success' ? 'bg-gradient-to-r from-mint-500 to-mint-400' : 'bg-gradient-to-r from-coral-500 to-coral-400'}`;
  const icon = type === 'success' ? 'check-circle-2' : 'alert-circle';
  inner.innerHTML = `<i data-lucide="${icon}" style="width:18px;height:18px;"></i>${msg}`;
  t.classList.remove('hidden');
  lucide.createIcons();
  setTimeout(() => t.classList.add('hidden'), 2500);
}

// Test connection to GAS before starting
async function testGASConnection() {
  try {
    const testResponse = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'test' }),
      signal: AbortSignal.timeout(5000)
    });
    
    if (!testResponse.ok) throw new Error('HTTP error');
    const testText = await testResponse.text();
    const testData = JSON.parse(testText);
    return testData && testData.success === true;
  } catch (err) {
    console.error('GAS connection test failed:', err);
    return false;
  }
}
